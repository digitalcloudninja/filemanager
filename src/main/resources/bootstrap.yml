spring:
  cloud:
    config:
      discovery:
        enabled: ${DISCOVERY_ENABLED:true}
        service-id: configuration
      name: filemanager
  docker:
    compose:
      profiles:
        active: default
      enabled: ${DOCKER_ENABLED:true}
eureka:
  client:
    region: us-east-1
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true